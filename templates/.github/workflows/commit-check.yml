name: Commit Message Check

on:
  pull_request:
    branches: [main]
  merge_group:

permissions:
  contents: read
  pull-requests: read

jobs:
  check-commits:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate WI commit format
        run: |
          COMMITS=$(git log origin/main..HEAD --pretty=format:"%s")
          if [ -z "$COMMITS" ]; then
            echo "No new commits to check (PR has no commits beyond main) - skipping validation"
            exit 0
          fi

          # WI-E2: 영숫자 ID 허용 통일 (예: WI-A2a-feat, WI-C3code-fix, WI-E1-ci)
          # 자기참조 결함 fix — 루트 flowset-ci.yml과 동일 패턴 (학습 37)
          # 서브넘버링(WI-NNN-1-fix) 보존을 위해 (-[0-9]+)? 그룹 유지
          PATTERN="^WI-[0-9A-Za-z]+(-[0-9]+)?-(feat|fix|docs|style|refactor|test|chore|perf|ci|revert) .+"
          PATTERN_SYSTEM="^WI-(chore|docs) .+"
          PATTERN_MERGE="^Merge "
          PATTERN_REVERT="^Revert "
          FAILED=0

          while IFS= read -r msg; do
            # GitHub 자동 생성 Merge / Revert 커밋은 스킵
            if [[ "$msg" =~ $PATTERN_MERGE ]] || [[ "$msg" =~ $PATTERN_REVERT ]]; then
              echo "SKIP (merge/revert): '$msg'"
              continue
            fi
            if [[ ! "$msg" =~ $PATTERN && ! "$msg" =~ $PATTERN_SYSTEM ]]; then
              echo "FAIL: '$msg'"
              echo "  Expected: WI-NNN-[type] 한글 작업명  (NNN = 영숫자 ID, 예: 001, A2a, C3code, E1)"
              echo "  Types: feat, fix, docs, style, refactor, test, chore, perf, ci, revert"
              echo "  System commits (no number): WI-chore ..., WI-docs ..."
              FAILED=1
            else
              echo "OK: '$msg'"
            fi
          done <<< "$COMMITS"

          if [ $FAILED -eq 1 ]; then
            echo ""
            echo "Commit message format: WI-NNN-[type] 작업 설명"
            echo "Example: WI-001-feat 사용자 인증 추가"
            exit 1
          fi
